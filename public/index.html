<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App | Node.JS Express.JS SQLite</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/fanta.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <section id="auth">
        <div>
            <h2>Login</h2>
            <p>Create an account!</p>
        </div>

        <p id="error" style="display: none; color: red;"></p>
        <input id="emailInput" placeholder="Email" type="email" />
        <input id="passwordInput" placeholder="Password" type="password" />
        <button id="authBtn">Submit</button>
        <hr />
        <div class="register-content">
            <p>Don't have an account?</p>
            <button id="registerBtn">Sign up</button>
        </div>
    </section>
    
    <header style="display: none;">
        <h1 class="text-gradient">You have 0 open tasks.</h1>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </header>
    
    <nav style="display: none;" class="tab-container">
        <button class="tab-button selected-tab" data-tab="All">
            <h4>All <span>(0)</span></h4>
        </button>
        <button class="tab-button" data-tab="Open">
            <h4>Open <span>(0)</span></h4>
        </button>
        <button class="tab-button" data-tab="Complete">
            <h4>Complete <span>(0)</span></h4>
        </button>
        <hr />
    </nav>
    
    <main style="display: none;"></main>

    <script>
        // Log to confirm script is loading
        console.log('✅ Script started loading');

        // State variables
        let token = localStorage.getItem('token');
        let isLoading = false;
        let isAuthenticating = false;
        let isRegistration = false;
        let selectedTab = 'All';
        let todos = [];
        const apiBase = '/';

        // Get DOM elements
        const nav = document.querySelector('nav');
        const header = document.querySelector('header');
        const main = document.querySelector('main');
        const navElements = document.querySelectorAll('.tab-button');
        const authContent = document.getElementById('auth');
        const error = document.getElementById('error');
        const email = document.getElementById('emailInput');
        const password = document.getElementById('passwordInput');
        const registerBtn = document.getElementById('registerBtn');
        const authBtn = document.getElementById('authBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        console.log('✅ DOM elements loaded');
        console.log('Token exists:', !!token);

        // PAGE RENDERING LOGIC
        async function showDashboard() {
            console.log('📱 Showing dashboard');
            nav.style.display = 'block';
            header.style.display = 'flex';
            main.style.display = 'flex';
            authContent.style.display = 'none';
            await fetchTodos();
        }

        function updateHeaderText() {
            const todosLength = todos.length;
            const newString = todos.length === 1 ?
                `You have 1 open task.` :
                `You have ${todosLength} open tasks.`;
            header.querySelector('h1').innerText = newString;
        }

        function updateNavCount() {
            navElements.forEach(ele => {
                const btnText = ele.innerText.split(' ')[0];
                const count = todos.filter(val => {
                    if (btnText === 'All') return true;
                    return btnText === 'Complete' ? val.completed : !val.completed;
                }).length;
                ele.querySelector('span').innerText = `(${count})`;
            });
        }

        function changeTab(tab) {
            console.log('Changing tab to:', tab);
            selectedTab = tab;
            navElements.forEach(val => {
                if (val.getAttribute('data-tab') === tab) {
                    val.classList.add('selected-tab');
                } else {
                    val.classList.remove('selected-tab');
                }
            });
            renderTodos();
        }

        function renderTodos() {
            updateNavCount();
            updateHeaderText();

            let todoList = '';
            todos.filter(val => {
                return selectedTab === 'All' ? true : 
                       selectedTab === 'Complete' ? val.completed : !val.completed;
            }).forEach((todo) => {
                const taskIndex = todo.id;
                todoList += `
                <div class="card todo-item">
                    <p>${todo.task}</p>
                    <div class="todo-buttons">
                        <button onclick="updateTodo(${taskIndex})" ${todo.completed ? 'disabled' : ''}>
                            <h6>Done</h6>
                        </button>
                        <button onclick="deleteTodo(${taskIndex})">
                            <h6>Delete</h6>
                        </button>
                    </div>
                </div>
                `;
            });
            todoList += `
            <div class="input-container">
                <input id="todoInput" placeholder="Add task" />
                <button onclick="addTodo()">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            `;
            main.innerHTML = todoList;
        }

        // AUTH LOGIC
        function toggleIsRegister() {
            console.log('🔄 Toggling registration mode');
            isRegistration = !isRegistration;
            registerBtn.innerText = isRegistration ? 'Sign in' : 'Sign up';
            document.querySelector('#auth > div h2').innerText = isRegistration ? 'Sign Up' : 'Login';
            document.querySelector('.register-content p').innerText = 
                isRegistration ? 'Already have an account?' : "Don't have an account?";
        }

        async function authenticate() {
            console.log('🔐 Authenticate called');
            
            const emailVal = email.value.trim();
            const passVal = password.value;

            console.log('Email:', emailVal);
            console.log('Password length:', passVal.length);

            // Validation
            if (isLoading || isAuthenticating) {
                console.log('⏳ Already processing');
                return;
            }

            if (!emailVal) {
                error.innerText = 'Please enter an email';
                error.style.display = 'block';
                return;
            }

            if (!emailVal.includes('@')) {
                error.innerText = 'Please enter a valid email';
                error.style.display = 'block';
                return;
            }

            if (!passVal || passVal.length < 6) {
                error.innerText = 'Password must be at least 6 characters';
                error.style.display = 'block';
                return;
            }

            error.style.display = 'none';
            isAuthenticating = true;
            authBtn.innerText = 'Authenticating...';
            authBtn.disabled = true;

            console.log('📡 Sending request...');

            try {
                const endpoint = isRegistration ? 'auth/register' : 'auth/login';
                console.log('Endpoint:', apiBase + endpoint);

                const response = await fetch(apiBase + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: emailVal, password: passVal })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (data.token) {
                    console.log('✅ Authentication successful!');
                    token = data.token;
                    localStorage.setItem('token', token);
                    authBtn.innerText = 'Loading...';
                    await fetchTodos();
                    showDashboard();
                } else {
                    throw new Error(data.error || 'Failed to authenticate');
                }

            } catch (err) {
                console.error('❌ Error:', err);
                error.innerText = err.message;
                error.style.display = 'block';
            } finally {
                authBtn.innerText = 'Submit';
                authBtn.disabled = false;
                isAuthenticating = false;
            }
        }

        function logout() {
            console.log('👋 Logging out');
            localStorage.removeItem('token');
            token = null;
            todos = [];
            selectedTab = 'All';
            
            // CRITICAL: Reset loading states
            isLoading = false;
            isAuthenticating = false;
            isRegistration = false;
            
            nav.style.display = 'none';
            header.style.display = 'none';
            main.style.display = 'none';
            authContent.style.display = 'block';
            
            email.value = '';
            password.value = '';
            error.style.display = 'none';
            authBtn.disabled = false;
            authBtn.innerText = 'Submit';
            
            console.log('✅ Logout complete, ready for new login');
        }

        // CRUD LOGIC
        async function fetchTodos() {
            console.log('📥 Fetching todos');
            isLoading = true;
            try {
                const response = await fetch(apiBase + 'todos', {
                    headers: { 'Authorization': token }
                });
                
                console.log('Fetch response:', response.status);

                if (!response.ok) {
                    throw new Error('Unauthorized');
                }
                
                const todosData = await response.json();
                console.log('Todos:', todosData);
                todos = todosData;
                renderTodos();
            } catch(err) {
                console.error('❌ Fetch error:', err);
                logout();
            } finally {
                isLoading = false;
            }
        }

        async function updateTodo(index) {
            await fetch(apiBase + 'todos/' + index, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify({ 
                    task: todos.find(val => val.id === index).task, 
                    completed: 1 
                })
            });
            fetchTodos();
        }

        async function deleteTodo(index) {
            await fetch(apiBase + 'todos/' + index, {
                method: 'DELETE',
                headers: { 'Authorization': token }
            });
            fetchTodos();
        }

        async function addTodo() {
            const todoInput = document.getElementById('todoInput');
            const task = todoInput.value.trim();
            if (!task) return;

            await fetch(apiBase + 'todos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify({ task })
            });
            todoInput.value = '';
            fetchTodos();
        }

        // Event Listeners
        authBtn.addEventListener('click', authenticate);
        registerBtn.addEventListener('click', toggleIsRegister);
        logoutBtn.addEventListener('click', logout);

        // Tab buttons
        navElements.forEach(btn => {
            btn.addEventListener('click', () => {
                changeTab(btn.getAttribute('data-tab'));
            });
        });

        // Enter key support
        password.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                authenticate();
            }
        });

        email.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                authenticate();
            }
        });

        console.log('✅ Event listeners attached');

        // INITIAL LOAD
        if (token) {
            console.log('🔑 Token found, auto-login...');
            (async function() {
                try {
                    await fetchTodos();
                    showDashboard();
                } catch(err) {
                    console.error('Auto-login failed:', err);
                    localStorage.removeItem('token');
                    token = null;
                }
            })();
        } else {
            console.log('👤 No token, showing login');
        }

        console.log('✅ Script fully loaded');
    </script>
</body>

</html>
